{% extends "base.html" %}
{% block title %}Draft Preparer - Brawlytics{% endblock %}

{% block extra_styles %}
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #080808; --card: #111; --card2: #161616; --line: rgba(255,255,255,.06);
        --text: #fff; --dim: #555; --dim2: #888; --blue: #5db0ff; --red: #ff4d4d; --win: #3ddc84;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    ::-webkit-scrollbar{ width:4px; height:4px; }
    ::-webkit-scrollbar-track{ background:transparent; }
    ::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.1); border-radius:4px; }
    ::-webkit-scrollbar-thumb:hover{ background:rgba(255,255,255,.2); }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Barlow Condensed', sans-serif; }

    .nav-link {
        position: fixed; top: 15px; right: 15px; z-index: 9999;
        background: var(--blue); color: #000;
        padding: 6px 14px; border-radius: 6px; text-decoration: none;
        font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
        transition: opacity 0.2s;
    }
    .nav-link:hover { opacity: 0.8; }

    .page-layout { display: grid; grid-template-columns: 240px 1fr; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar { background: var(--card); border-right: 1px solid var(--line); display: flex; flex-direction: column; overflow: hidden; }
    .map-list-container { flex: 1; overflow-y: auto; padding: 4px 0; }
    .mode-section-header {
        display: flex; align-items: center; gap: 8px;
        padding: 9px 12px 7px;
        font-size: .72rem; color: var(--dim2); letter-spacing: 2px; font-weight: 800; text-transform: uppercase;
        border-bottom: 1px solid var(--line); margin-top: 8px;
    }
    .mode-section-header:first-child { margin-top: 0; }
    .mode-section-header img { width: 20px; height: 20px; object-fit: contain; opacity: .85; }
    .mode-section-header .mode-count { margin-left: auto; font-size: .62rem; color: var(--dim); font-weight: 600; letter-spacing: 1px; }
    .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; padding: 4px; }
    .map-item {
        display: flex; gap: 7px; align-items: center;
        padding: 6px 8px; cursor: pointer; transition: .12s;
        border-radius: 7px; border: 1px solid transparent; min-width: 0;
    }
    .map-item:hover { background: rgba(255,255,255,.04); }
    .map-item.active { background: rgba(93,176,255,.08); border-color: rgba(93,176,255,.25); }
    .map-icon { width: 30px; height: 30px; border-radius: 5px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--line); }
    .map-item-info { min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .map-item-name { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .2px; line-height: 1.15; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .map-item-meta { display: flex; align-items: center; gap: 4px; }
    .map-item-mode-icon { width: 13px; height: 13px; object-fit: contain; opacity: .7; }

    /* ── Main area ── */
    .main-area { display: flex; flex-direction: column; overflow: hidden; height: 100vh; }

    /* ── Banner — identical to draft.html ── */
    .active-map-banner {
        display: flex; align-items: center;
        border-bottom: 1px solid var(--line); flex-shrink: 0;
        background: var(--card); overflow: hidden; position: relative; height: 120px;
    }
    .banner-img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; position: absolute; top: 0; left: 0; }
    .banner-overlay {
        position: relative; z-index: 1; width: 100%;
        background: linear-gradient(to right, rgba(17,17,17,0.95) 0%, rgba(17,17,17,0.75) 55%, rgba(17,17,17,0.2) 100%);
        padding: 16px 24px; display: flex; align-items: center; gap: 16px; height: 100%;
    }
    .banner-mode-icon { width: 46px; height: 46px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 0 6px rgba(0,0,0,.8)); display: none; }
    .banner-info { display: flex; flex-direction: column; }
    .banner-info h2 { font-size: 2rem; font-weight: 900; text-transform: uppercase; font-style: italic; letter-spacing: .5px; line-height: 1; margin: 0; }
    .banner-sub { font-size: .8rem; color: var(--dim2); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 5px; display: flex; align-items: center; gap: 6px; }
    .banner-mode-label { color: var(--blue); font-weight: 800; font-size: .85rem; }

    /* ── Main content: left col | centre | right col ── */
    .main-content {
        flex: 1; min-height: 0;
        display: grid;
        grid-template-columns: 1fr 300px 1fr;
        gap: 14px;
        padding: 12px 14px;
        overflow: hidden;
    }

    /* ── Draft columns ── */
    .draft-col {
        min-height: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    /* ── Collapsed card ── */
    .draft-column-card {
        flex: 1; min-height: 0;
        background: var(--card); border-radius: 14px; border: 1px solid var(--line);
        display: flex; flex-direction: column; overflow: hidden;
    }
    .draft-section { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    .draft-section + .draft-section { border-top: 1px solid var(--line); }
    .draft-section-header {
        padding: 5px 14px;
        font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px;
        color: var(--dim2); border-bottom: 1px solid var(--line);
        background: rgba(255,255,255,.02);
        display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .draft-section-header .box-num {
        width: 17px; height: 17px; border-radius: 50%;
        background: var(--card2); border: 1px solid var(--line);
        display: flex; align-items: center; justify-content: center;
        font-size: 0.58rem; font-weight: 900; color: var(--dim);
    }
    .draft-box-body {
        flex: 1; min-height: 0;
        padding: 8px 14px;
        display: flex; gap: 12px; align-items: center;
    }

    /* Number wrapper above main slot */
    .main-slot-wrap {
        flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .box-num-label {
        font-size: 0.7rem; font-weight: 900; color: var(--dim2);
        letter-spacing: 2px; line-height: 1;
        background: var(--card2); border: 1px solid var(--line);
        border-radius: 5px; padding: 2px 7px;
        width: 90px; text-align: center; box-sizing: border-box;
    }

    /* Main brawler slot — square */
    .main-brawler-slot {
        flex-shrink: 0; width: 90px; height: 90px;
        border-radius: 10px; border: 2px solid #222; background: #000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; position: relative; transition: 0.15s; overflow: hidden;
    }
    .main-brawler-slot:hover { border-color: rgba(255,255,255,.2); }
    .main-brawler-slot.active-slot { border-color: rgba(93,176,255,.6); background: rgba(93,176,255,.05); }
    .main-brawler-slot.filled { border-color: rgba(93,176,255,.5); }
    .main-brawler-slot img.slot-img { width: 100%; height: 100%; object-fit: cover; }
    .main-brawler-slot .slot-name {
        position: absolute; bottom: 0; width: 100%;
        background: rgba(0,0,0,.8); color: rgba(255,255,255,.9);
        font-size: .62rem; font-weight: 900; text-align: center; padding: 3px 0;
        text-transform: uppercase; letter-spacing: .5px;
    }
    .main-brawler-slot .plus-icon { font-size: 1.8rem; color: var(--dim); }

    /* Slots section — fills remaining width, distributes height to rows */
    .slots-section {
        flex: 1; min-width: 0; min-height: 0;
        display: flex; flex-direction: column;
    }
    .responses-label {
        font-size: 0.55rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
        color: var(--dim); padding: 4px 0 3px; flex-shrink: 0;
    }
    .responses-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
    }

    /* Small slots — square */
    .small-slot {
        aspect-ratio: 1;
        background: #000; border-radius: 8px; border: 2px solid #222;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; position: relative; transition: 0.15s; overflow: hidden;
    }
    .small-slot:hover { border-color: rgba(255,255,255,.18); }
    .small-slot.active-slot { border-color: rgba(93,176,255,.6); background: rgba(93,176,255,.05); }
    .small-slot.filled { border-color: rgba(93,176,255,.35); }
    .small-slot img { width: 100%; height: 100%; object-fit: cover; }
    .small-slot .plus-icon { font-size: 0.9rem; color: var(--dim); }

    /* Remove button — hover only, inside slot */
    .slot-remove {
        position: absolute; top: 3px; right: 3px;
        width: 16px; height: 16px; background: var(--red);
        border-radius: 50%; color: white; display: none; align-items: center; justify-content: center;
        font-size: 9px; font-weight: bold; z-index: 2; cursor: pointer; line-height: 1;
    }
    .main-brawler-slot:hover .slot-remove,
    .small-slot:hover .slot-remove,
    .ban-slot:hover .slot-remove { display: flex; }

    /* ── Centre panel ── */
    .centre-panel {
        flex: 0 0 340px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 16px;
    }

    .coin-btn {
        width: 76px; height: 76px; border-radius: 50%; border: none;
        background: none; cursor: pointer; padding: 0;
        transition: transform 0.18s; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .coin-btn:hover { transform: scale(1.1); }
    .coin-btn:active { transform: scale(0.95); }
    .coin-btn img { width: 76px; height: 76px; border-radius: 50%; object-fit: cover; display: block; box-shadow: 0 0 20px rgba(0,0,0,.8); }

    .map-display { display: flex; justify-content: center; align-items: center; }
    .map-display img {
        max-height: 380px; max-width: 100%;
        width: auto; height: auto;
        object-fit: contain; display: block;
        border: 2px solid rgba(255,255,255,.08); border-radius: 10px;
    }

    .global-bans-section { display: flex; flex-direction: column; align-items: center; gap: 8px; flex-shrink: 0; }
    .global-bans-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--dim); }
    .global-bans-row { display: flex; gap: 8px; align-items: center; }

    .ban-slot {
        width: 64px; height: 64px; border-radius: 9px; overflow: hidden;
        border: 1px solid #1e1e1e; background: #000;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; position: relative; transition: 0.15s; flex-shrink: 0;
    }
    .ban-slot:hover { border-color: rgba(255,77,77,.4); }
    .ban-slot.active-slot { border-color: var(--red); background: rgba(255,77,77,.06); }
    .ban-slot.filled { filter: grayscale(1) brightness(.85); }
    .ban-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .ban-slot .plus-icon { font-size: 1.1rem; color: rgba(255,77,77,.35); }

    /* in-use */
    .in-use { opacity: 0.2 !important; pointer-events: none; filter: grayscale(1); }

    /* ── Picker Modal ── */
    .picker-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,.7); display: none; align-items: center; justify-content: center; }
    .picker-overlay.open { display: flex; }
    .picker-modal { background: var(--card); border: 1px solid rgba(255,255,255,.1); border-radius: 16px; width: 420px; max-height: 540px; display: flex; flex-direction: column; overflow: hidden; }
    .picker-modal-header { padding: 12px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
    .picker-close { background: none; border: none; color: var(--dim2); cursor: pointer; font-size: 1.1rem; }
    .picker-search {
        margin: 10px 14px 8px; width: calc(100% - 28px);
        background: #000; border: 1px solid var(--line);
        color: white; padding: 8px 12px; border-radius: 8px; font-size: 0.8rem;
        box-sizing: border-box; font-family: 'Barlow Condensed', sans-serif;
    }
    .picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); grid-auto-rows: 58px; gap: 5px; padding: 0 14px 14px; overflow-y: auto; flex: 1; }
    .picker-item { aspect-ratio: 1; overflow: hidden; cursor: pointer; opacity: 0.8; transition: 0.1s; border-radius: 8px; }
    .picker-item:hover { opacity: 1; transform: scale(1.06); }
    .picker-item img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 8px; }
    .picker-item.in-use { opacity: 0.18; pointer-events: none; filter: grayscale(1); }
</style>
{% endblock %}

{% block content %}
<a href="/" class="nav-link">← Go to Analyser</a>

<div class="page-layout">
    <div class="sidebar">
        <div class="map-list-container" id="mapListContainer"></div>
    </div>

    <div class="main-area">
        <div class="active-map-banner">
            <img id="activeMapImg" class="banner-img" src="" alt="" onerror="this.style.display='none'">
            <div class="banner-overlay">
                <img class="banner-mode-icon" id="activeModeIcon" src="" alt="" onerror="this.style.display='none'">
                <div class="banner-info">
                    <h2 id="activeMapName">Draft Preparer</h2>
                    <div class="banner-sub">
                        <span class="banner-mode-label" id="activeModeName"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="draft-col" id="draftColLeft"></div>

            <div class="centre-panel">
                <button class="coin-btn" id="coinBtn" onclick="toggleFirstPick()" title="Click to switch first pick side">
                    <img id="coinImg" src="/blue.png" onerror="this.style.background='#5db0ff'">
                </button>
                <div class="map-display">
                    <img id="centreMapImg" src="" alt="" onerror="this.style.display='none'">
                </div>
                <div class="global-bans-section">
                    <div class="global-bans-label">Bans</div>
                    <div class="global-bans-row" id="globalBansRow"></div>
                </div>
            </div>

            <div class="draft-col" id="draftColRight"></div>
        </div>
    </div>
</div>

<!-- Brawler Picker Modal -->
<div class="picker-overlay" id="pickerOverlay" onclick="closePickerIfOutside(event)">
    <div class="picker-modal">
        <div class="picker-modal-header">
            <span id="pickerTitle">Pick Brawler</span>
            <button class="picker-close" onclick="closePicker()">✕</button>
        </div>
        <input type="text" class="picker-search" placeholder="Search brawler..." oninput="filterPicker(this.value)" id="pickerSearch">
        <div class="picker-grid" id="pickerGrid"></div>
    </div>
</div>

<script>
const ALL_BRAWLERS = {{ all_brawlers | tojson }};
const SYNERGY = {{ synergy_data | default({}) | tojson }};
const META = {{ meta_scores | default({}) | tojson }};
const MATCHUP = {{ matchup_data | default({}) | tojson }};
const MAPS_BY_MODE = {{ maps_by_mode | tojson }};

const NUM_BOXES = 6;
const NUM_GLOBAL_BANS = 3;

function freshBoxes() {
    return Array.from({length: NUM_BOXES}, () => ({
        main: null,
        picks: [null, null, null, null],
        responses: [null, null, null, null]
    }));
}

let state = {
    firstPick: 'blue',
    selectedMode: '', selectedMap: '',
    globalBans: Array(NUM_GLOBAL_BANS).fill(null),
    boxes: freshBoxes(),
    activeBox: null, activeSlotType: null, activeSlotIdx: null,
    mapStates: {}
};

function mapKey(mode, map, side) { return `${mode}||${map}||${side}`; }

function saveCurrentMapState() {
    if (!state.selectedMap) return;
    state.mapStates[mapKey(state.selectedMode, state.selectedMap, state.firstPick)] = {
        globalBans: [...state.globalBans],
        boxes: state.boxes.map(b => ({ main: b.main, picks: [...b.picks], responses: [...b.responses] }))
    };
}

function loadMapState(mode, map, side) {
    const saved = state.mapStates[mapKey(mode, map, side)];
    if (saved) {
        state.globalBans = [...saved.globalBans];
        state.boxes = saved.boxes.map(b => ({ main: b.main, picks: [...b.picks], responses: [...b.responses] }));
    } else {
        state.globalBans = Array(NUM_GLOBAL_BANS).fill(null);
        state.boxes = freshBoxes();
    }
}

function toggleFirstPick() {
    saveCurrentMapState();
    state.firstPick = state.firstPick === 'blue' ? 'red' : 'blue';
    document.getElementById('coinImg').src = state.firstPick === 'blue' ? '/blue.png' : '/red.png';
    if (state.selectedMap) loadMapState(state.selectedMode, state.selectedMap, state.firstPick);
    saveToServer(); renderDraftGrid();
}

function buildSidebar() {
    const container = document.getElementById('mapListContainer');
    container.innerHTML = '';
    Object.keys(MAPS_BY_MODE).sort().forEach(mode => {
        const maps = MAPS_BY_MODE[mode].sort();
        if (!maps.length) return;
        const modeSlug = mode.toLowerCase().replace(/ /g,'_');
        const secHeader = document.createElement('div');
        secHeader.className = 'mode-section-header';
        secHeader.innerHTML = `<img src="/static/images/modes/${modeSlug}.png" onerror="this.style.display='none'">${mode}<span class="mode-count">${maps.length} map${maps.length !== 1 ? 's' : ''}</span>`;
        container.appendChild(secHeader);
        const grid = document.createElement('div');
        grid.className = 'map-grid';
        maps.forEach(map => {
            const item = document.createElement('div');
            item.className = 'map-item';
            item.dataset.mode = mode; item.dataset.map = map;
            const imgSlug = map.toLowerCase().replace(/ /g,'_').replace(/-/g,'_');
            item.innerHTML = `
                <img class="map-icon" src="/static/images/maps/${imgSlug}.png" onerror="this.src='/static/images/maps/unknown.png'">
                <div class="map-item-info">
                    <div class="map-item-name">${map}</div>
                    <div class="map-item-meta"><img class="map-item-mode-icon" src="/static/images/modes/${modeSlug}.png" onerror="this.style.display='none'"></div>
                </div>`;
            item.onclick = () => selectMap(mode, map);
            grid.appendChild(item);
        });
        container.appendChild(grid);
    });
}

function selectMap(mode, map) {
    saveCurrentMapState();
    state.selectedMode = mode; state.selectedMap = map;
    loadMapState(mode, map, state.firstPick);
    saveToServer();
    document.querySelectorAll('.map-item').forEach(el =>
        el.classList.toggle('active', el.dataset.mode === mode && el.dataset.map === map));
    const imgSlug = map.toLowerCase().replace(/ /g,'_').replace(/-/g,'_');
    const mapPath = `/static/images/maps/${imgSlug}.png`;

    const bannerImg = document.getElementById('activeMapImg');
    bannerImg.style.display = '';
    bannerImg.src = mapPath;

    const centreImg = document.getElementById('centreMapImg');
    centreImg.style.display = '';
    centreImg.src = mapPath;

    document.getElementById('activeMapName').textContent = map;
    document.getElementById('activeModeName').textContent = mode;

    const modeIconEl = document.getElementById('activeModeIcon');
    modeIconEl.style.display = 'block';
    modeIconEl.src = `/static/images/modes/${mode.toLowerCase().replace(/ /g,'_')}.png`;
    renderDraftGrid();
}

function renderGlobalBans() {
    const row = document.getElementById('globalBansRow');
    row.innerHTML = '';
    state.globalBans.forEach((b, j) => {
        const isActive = state.activeBox === -1 && state.activeSlotType === 'ban' && state.activeSlotIdx === j;
        const div = document.createElement('div');
        div.className = `ban-slot${b ? ' filled' : ''}${isActive ? ' active-slot' : ''}`;
        div.onclick = () => openPicker(-1, 'ban', j);
        div.innerHTML = b
            ? `<div class="slot-remove" onclick="event.stopPropagation();removeGlobalBan(${j})">✕</div>
               <img src="/static/images/brawlers/${norm(b)}.png" onerror="this.style.opacity='.2'">`
            : `<div class="plus-icon">+</div>`;
        row.appendChild(div);
    });
}

function removeGlobalBan(idx) { state.globalBans[idx] = null; saveToServer(); renderGlobalBans(); }

function renderDraftGrid() {
    renderGlobalBans();
    const colLeft = document.getElementById('draftColLeft');
    const colRight = document.getElementById('draftColRight');
    colLeft.innerHTML = '';
    colRight.innerHTML = '';

    const fpColor = state.firstPick === 'blue' ? 'var(--blue)' : 'var(--red)';
    const fpLabel = state.firstPick === 'blue' ? 'Blue' : 'Red';

    const cardLeft = document.createElement('div');
    cardLeft.className = 'draft-column-card';
    const cardRight = document.createElement('div');
    cardRight.className = 'draft-column-card';

    state.boxes.forEach((box, i) => {
        const section = document.createElement('div');
        section.className = 'draft-section';

        const mainActive = state.activeBox === i && state.activeSlotType === 'main';
        const mainCls = `main-brawler-slot${box.main ? ' filled' : ''}${mainActive ? ' active-slot' : ''}`;

        const picksHtml = box.picks.map((b, j) => {
            const isActive = state.activeBox === i && state.activeSlotType === 'pick' && state.activeSlotIdx === j;
            const cls = `small-slot${b ? ' filled' : ''}${isActive ? ' active-slot' : ''}`;
            return `<div class="${cls}" onclick="openPicker(${i},'pick',${j})">
                ${b ? `<div class="slot-remove" onclick="event.stopPropagation();removeSlot(${i},'pick',${j})">✕</div>
                       <img src="/static/images/brawlers/${norm(b)}.png" onerror="this.style.opacity='.2'">` : `<div class="plus-icon">+</div>`}
            </div>`;
        }).join('');

        const respHtml = box.responses.map((b, j) => {
            const isActive = state.activeBox === i && state.activeSlotType === 'response' && state.activeSlotIdx === j;
            const cls = `small-slot${b ? ' filled' : ''}${isActive ? ' active-slot' : ''}`;
            return `<div class="${cls}" onclick="openPicker(${i},'response',${j})">
                ${b ? `<div class="slot-remove" onclick="event.stopPropagation();removeSlot(${i},'response',${j})">✕</div>
                       <img src="/static/images/brawlers/${norm(b)}.png" onerror="this.style.opacity='.2'">` : `<div class="plus-icon">+</div>`}
            </div>`;
        }).join('');

        section.innerHTML = `
            <div class="draft-box-body">
                <div class="main-slot-wrap">
                    <div class="box-num-label">${i + 1}</div>
                    <div class="${mainCls}" onclick="openPicker(${i},'main',null)">
                        ${box.main
                            ? `<div class="slot-remove" onclick="event.stopPropagation();removeSlot(${i},'main',null)">✕</div>
                               <img class="slot-img" src="/static/images/brawlers/${norm(box.main)}.png" onerror="this.style.opacity='.2'">
                               <div class="slot-name">${box.main}</div>`
                            : `<div class="plus-icon">+</div>`}
                    </div>
                </div>
                <div class="slots-section">
                    <div class="responses-row">${picksHtml}</div>
                    <div class="responses-row" style="margin-top:5px">${respHtml}</div>
                </div>
            </div>`;

        if (i < 3) cardLeft.appendChild(section);
        else cardRight.appendChild(section);
    });

    colLeft.appendChild(cardLeft);
    colRight.appendChild(cardRight);
}

function openPicker(boxIdx, slotType, slotIdx) {
    state.activeBox = boxIdx; state.activeSlotType = slotType; state.activeSlotIdx = slotIdx;
    const typeLabel = slotType === 'main' ? 'Main Brawler' : slotType === 'pick' ? 'Pick' : slotType === 'ban' ? 'Ban' : 'Response';
    document.getElementById('pickerTitle').textContent = `${boxIdx === -1 ? 'Global' : `Box ${boxIdx+1}`} — ${typeLabel}`;
    document.getElementById('pickerSearch').value = '';
    renderPickerGrid('');
    document.getElementById('pickerOverlay').classList.add('open');
    renderDraftGrid();
    setTimeout(() => document.getElementById('pickerSearch').focus(), 30);
}

function closePicker() {
    document.getElementById('pickerOverlay').classList.remove('open');
    state.activeBox = null; state.activeSlotType = null; state.activeSlotIdx = null;
    renderDraftGrid();
}

function closePickerIfOutside(e) { if (e.target === document.getElementById('pickerOverlay')) closePicker(); }

function renderPickerGrid(query) {
    const grid = document.getElementById('pickerGrid');
    grid.innerHTML = '';
    const q = query.toLowerCase();
    ALL_BRAWLERS.forEach(name => {
        if (q && !name.toLowerCase().includes(q)) return;
        const item = document.createElement('div');
        item.className = 'picker-item';
        item.innerHTML = `<img src="/static/images/brawlers/${norm(name)}.png" title="${name}" onerror="this.style.opacity='.2'">`;
        item.onclick = () => pickBrawler(name);
        grid.appendChild(item);
    });
}

function filterPicker(query) { renderPickerGrid(query); }

function pickBrawler(name) {
    const { activeBox, activeSlotType, activeSlotIdx } = state;
    if (activeBox === null) return;
    if (activeBox === -1 && activeSlotType === 'ban') {
        state.globalBans[activeSlotIdx] = name;
        const nextEmpty = state.globalBans.indexOf(null);
        if (nextEmpty !== -1) state.activeSlotIdx = nextEmpty;
        saveToServer(); closePicker(); renderDraftGrid(); return;
    }
    const box = state.boxes[activeBox];
    if (activeSlotType === 'main') {
        box.main = name;
    } else if (activeSlotType === 'pick') {
        box.picks[activeSlotIdx] = name;
        const nextEmpty = box.picks.indexOf(null);
        if (nextEmpty !== -1) state.activeSlotIdx = nextEmpty;
        else { state.activeSlotType = 'response'; state.activeSlotIdx = 0; }
    } else {
        box.responses[activeSlotIdx] = name;
        const nextEmpty = box.responses.indexOf(null);
        if (nextEmpty !== -1) state.activeSlotIdx = nextEmpty;
    }
    saveToServer(); closePicker(); renderDraftGrid();
}

function removeSlot(boxIdx, slotType, slotIdx) {
    const box = state.boxes[boxIdx];
    if (slotType === 'main') box.main = null;
    else if (slotType === 'pick') box.picks[slotIdx] = null;
    else box.responses[slotIdx] = null;
    saveToServer(); renderDraftGrid();
}

function norm(n) { return n.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,''); }

let saveTimer = null;
function saveToServer() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
        try {
            await fetch('/api/prep-state', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    firstPick: state.firstPick,
                    selectedMode: state.selectedMode,
                    selectedMap: state.selectedMap,
                    globalBans: state.globalBans,
                    boxes: state.boxes,
                    mapStates: state.mapStates
                })
            });
        } catch(e) {}
    }, 500);
}

async function loadFromServer() {
    try {
        const res = await fetch('/api/prep-state');
        const d = await res.json();
        if (!d || !Object.keys(d).length) return;
        state.firstPick = d.firstPick || 'blue';
        state.selectedMode = d.selectedMode || '';
        state.selectedMap = d.selectedMap || '';
        state.globalBans = d.globalBans || Array(NUM_GLOBAL_BANS).fill(null);
        state.boxes = d.boxes || freshBoxes();
        state.mapStates = d.mapStates || {};
    } catch(e) {}
}

window.onload = async () => {
    await loadFromServer();
    buildSidebar();
    document.getElementById('coinImg').src = state.firstPick === 'blue' ? '/blue.png' : '/red.png';
    if (state.selectedMap) {
        const imgSlug = state.selectedMap.toLowerCase().replace(/ /g,'_').replace(/-/g,'_');
        const mapPath = `/static/images/maps/${imgSlug}.png`;
        const bannerImg = document.getElementById('activeMapImg');
        bannerImg.style.display = ''; bannerImg.src = mapPath;
        document.getElementById('centreMapImg').src = mapPath;
        document.getElementById('centreMapImg').style.display = '';
        document.getElementById('activeMapName').textContent = state.selectedMap;
        document.getElementById('activeModeName').textContent = state.selectedMode;
        const modeIconEl = document.getElementById('activeModeIcon');
        modeIconEl.style.display = 'block';
        modeIconEl.src = `/static/images/modes/${state.selectedMode.toLowerCase().replace(/ /g,'_')}.png`;
        document.querySelectorAll('.map-item').forEach(el =>
            el.classList.toggle('active', el.dataset.mode === state.selectedMode && el.dataset.map === state.selectedMap));
    }
    renderDraftGrid();
};
</script>
{% endblock %}
